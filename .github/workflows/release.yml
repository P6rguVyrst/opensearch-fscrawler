name: Release

on:
  push:
    tags: ['v*.*.*']

permissions: read-all

jobs:
  test:
    name: Test & SAST
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Lint (ruff with security rules)
        run: uv run ruff check --select S src/

      - name: SAST (bandit)
        run: uv run bandit -r src/ -c pyproject.toml

      - name: Dependency vulnerability scan (pip-audit)
        run: uv export --frozen --no-dev --no-emit-project | uvx pip-audit -r /dev/stdin

      - name: Unit tests
        run: uv run pytest tests/unit -sv --cov=fscrawler --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad  # v4
        with:
          files: coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write       # OIDC trusted publishing
      attestations: write   # SLSA provenance

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v4

      - name: Build distributions
        run: uv build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1

  publish-docker:
    name: Publish to GHCR
    needs: test
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
      attestations: write   # SLSA provenance
      id-token: write       # required by attest-build-provenance

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build amd64 only and load locally so Trivy can scan it before we push anything
      - name: Build image for scanning (amd64)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v5
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: scan-target:latest
          cache-from: type=gha

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          image-ref: scan-target:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # Trivy passed — build multi-arch and push
      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
